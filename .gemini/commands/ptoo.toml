prompt = '''
Você vai executar a skill **/ptoo** deste repositório no Gemini CLI: o calibrador iterativo da
CLI `photo_to_outline.py` que, a partir de uma foto sobre a base de calibração ArUco, busca um
POCKET de encaixe justo. Critério de aceite (gate RÍGIDO): `contém a peça` >= 0.9999.

## Argumentos desta invocação
{{args}}

Formato esperado: `<foto.jpg> --pass N [--debug]`.
- `<foto>`: 1º argumento; se for nome simples, resolva na raiz do repo (`C:\PtoO\<foto>`).
- `--pass N`: teto rígido de tentativas de calibração (default 3 se omitido).
- `--debug`: ativa o modo crítico (descrito no SKILL.md) ALÉM de calibrar.

## Instruções autoritativas (siga à risca)
O procedimento completo do laço (rodar → inspecionar o overlay com zoom → ajustar UM/DOIS flags →
repetir), as heurísticas e o critério de parada estão no **SKILL.md**; a memória de calibração
(start dinâmico, cache último-bom, heurísticas, notas de aceite) está na **memory.md**; e a
referência operacional de cada flag está em **docs/manual.md**. Os três são injetados abaixo —
leia-os e EXECUTE o laço você mesmo com as ferramentas do Gemini CLI (shell + leitura/escrita de
arquivos). Se por algum motivo o conteúdo não aparecer injetado, ABRA estes arquivos você mesmo:
`.claude/skills/ptoo/SKILL.md`, `.claude/skills/ptoo/memory.md`, `docs/manual.md`.

### SKILL.md (procedimento + heurísticas)
@{.claude/skills/ptoo/SKILL.md}


@{docs/manual.md}

## Adaptações para o Gemini CLI (onde o SKILL.md pressupõe o ambiente do Claude)
- **NÃO existe a "Skill tool" do Claude aqui.** Apenas siga o procedimento do SKILL.md diretamente.
- **Read/Edit/Write:** use as ferramentas equivalentes do Gemini CLI; rode comandos via shell.
- **Python:** SEMPRE o do venv — `.venv/Scripts/python` (Windows). Trabalhe a partir de `C:\PtoO`.
- **Tiles de zoom:** o SKILL.md manda gravar num "scratchpad" próprio do Claude. Aqui grave em
  `_debug/ptoo_tiles/<name>/` (ignorado pelo git) e gere os zooms com
  `.venv/Scripts/python .claude/skills/ptoo/scripts/zoom.py --overlay-svg _overlay_<name>.svg`
  `--seg-overlay _overlay_<name>.png --out-dir _debug/ptoo_tiles/<name>`.
- **Atualizar a memória:** ao final do laço, edite `.claude/skills/ptoo/memory.md` exatamente como
  o SKILL.md descreve (acrescente/substitua a linha do objeto no cache e RECOMPUTE o `start`),
  mantendo o arquivo < 100 linhas. É a MESMA memória usada pela versão Claude da skill.
'''
